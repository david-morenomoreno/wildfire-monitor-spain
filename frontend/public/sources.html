<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Wildfire Monitor Spain — Data sources &amp; status</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script>
    document.documentElement.dataset.theme = localStorage.getItem("wm-theme") || "dark";
  </script>
  <link rel="stylesheet" href="/shared.css" />
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg-page);
      color: var(--text-primary);
      font-family: var(--font-ui);
    }
    .wrap { max-width: 900px; margin: 0 auto; padding: 28px 24px 60px; }

    .page-head { margin-bottom: 20px; }
    .page-head h1 { font-size: 19px; margin: 0 0 6px; font-weight: 650; }
    .page-head .subtitle { color: var(--text-muted); font-size: 13px; margin: 0; }

    .search-field {
      position: relative;
      margin: 20px 0 24px;
    }
    .search-field input {
      width: 100%;
      background: var(--bg-elevated);
      color: var(--text-primary);
      border: 1px solid var(--border-soft);
      border-radius: 10px;
      padding: 10px 14px 10px 36px;
      font-size: 13px;
      font-family: var(--font-ui);
      outline: none;
      transition: border-color 0.15s ease;
    }
    .search-field input:focus { border-color: var(--accent); }
    .search-field input:hover { border-color: var(--border-strong); }
    .search-field svg {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
    }

    .category-section { margin-bottom: 28px; }
    .category-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-muted);
      margin: 0 0 10px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border-soft);
    }
    .category-count {
      font-family: var(--font-mono);
      font-weight: 400;
      letter-spacing: normal;
      text-transform: none;
      margin-left: 6px;
    }

    .source-card {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 14px 16px;
      border-radius: 12px;
      background: var(--bg-elevated);
      border: 1px solid var(--border-soft);
      margin-bottom: 8px;
      transition: border-color 0.15s ease;
    }
    .source-card:hover { border-color: var(--border-strong); }

    .source-status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-top: 5px;
      flex-shrink: 0;
    }
    .source-status-dot.ok { background: var(--ok); box-shadow: 0 0 6px rgba(74, 222, 128, 0.5); }
    .source-status-dot.degraded { background: var(--degraded); box-shadow: 0 0 6px rgba(250, 204, 21, 0.45); }
    .source-status-dot.disrupted { background: var(--disrupted); box-shadow: 0 0 6px rgba(248, 113, 113, 0.5); }
    .source-status-dot.skipped { background: var(--skipped); }

    .source-card-body { flex: 1; min-width: 0; }
    .source-card-top {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }
    .source-card-name {
      font-size: 14px;
      font-weight: 650;
      color: var(--text-primary);
      text-decoration: none;
    }
    .source-card-name:hover { color: var(--accent); }
    .status-badge {
      font-size: 9.5px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 3px 8px;
      border-radius: 999px;
      white-space: nowrap;
    }
    .status-badge.ok { background: rgba(74, 222, 128, 0.18); color: var(--ok); }
    .status-badge.degraded { background: rgba(250, 204, 21, 0.18); color: var(--degraded); }
    .status-badge.disrupted { background: rgba(248, 113, 113, 0.22); color: var(--disrupted); }
    .status-badge.skipped { background: rgba(255, 255, 255, 0.06); color: var(--text-muted); }

    .source-card-detail {
      margin-top: 5px;
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.5;
    }
    .source-card-meta {
      margin-top: 6px;
      font-family: var(--font-mono);
      font-size: 10.5px;
      color: var(--text-muted);
    }
    /* ---------- Inline 14-day health strip (merged from the old Status page) ---------- */
    .health-strip {
      margin-top: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .health-strip-label {
      font-family: var(--font-mono);
      font-size: 9px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }
    .health-strip-dots { display: flex; gap: 3px; }
    .health-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      display: inline-block;
    }
    .health-dot.status-ok { background: var(--ok); }
    .health-dot.status-degraded { background: var(--degraded); }
    .health-dot.status-disrupted { background: var(--disrupted); }
    .health-dot.status-skipped { background: var(--skipped); }
    .health-dot.status-none { background: transparent; border: 1px solid var(--border-soft); }

    .source-card-actions { margin-top: 8px; }
    .refresh-btn {
      font-family: var(--font-ui);
      font-size: 11px;
      font-weight: 600;
      color: var(--text-primary);
      background: var(--bg-elevated-hover);
      border: 1px solid var(--border-soft);
      border-radius: 7px;
      padding: 5px 11px;
      cursor: pointer;
      transition: border-color 0.15s ease;
    }
    .refresh-btn:hover { border-color: var(--accent); }
    .refresh-btn:disabled { opacity: 0.6; cursor: default; }

    .empty { padding: 40px; text-align: center; color: var(--text-muted); }
  </style>
</head>
<body>
  <nav class="topbar">
    <span class="topbar-brand"><span class="pulse"></span>Wildfire Monitor</span>
    <div class="topbar-tabs">
      <a class="topbar-tab" href="/index.html">Mapa</a>
      <a class="topbar-tab" href="/ranking.html">Ranking</a>
      <a class="topbar-tab active" href="/sources.html">Fuentes</a>
    </div>
    <button class="theme-toggle" id="theme-toggle" title="Cambiar a modo claro" aria-label="Cambiar tema">🌙</button>
  </nav>
  <div class="wrap">
    <div class="page-head">
      <h1>Data sources &amp; status</h1>
      <p class="subtitle">Every feed this monitor pulls from — satellite hotspots, official bulletins, live regional incident status, and community reports — with each one's 14-day ingestion history inline.</p>
    </div>

    <div class="search-field">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="7"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
      <input type="text" id="source-search" placeholder="Search sources by name…" autocomplete="off" />
    </div>

    <div id="content"><div class="empty">Loading…</div></div>
  </div>

  <script src="/sources.js"></script>
</body>
</html>
