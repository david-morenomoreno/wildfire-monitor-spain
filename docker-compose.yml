services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: wildfire
      POSTGRES_PASSWORD: wildfire
      POSTGRES_DB: wildfire
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wildfire"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://wildfire:wildfire@db:5432/wildfire
      FIRMS_MAP_KEY: ${FIRMS_MAP_KEY:-}
      FIRMS_BBOX: ${FIRMS_BBOX:--9.5,35.9,4.4,43.9}
      FETCH_INTERVAL_MINUTES: ${FETCH_INTERVAL_MINUTES:-180}
      UPLOAD_DIR: /data/uploads
      TELEGRAM_API_ID: ${TELEGRAM_API_ID:-0}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH:-}
      TELEGRAM_SESSION_STRING: ${TELEGRAM_SESSION_STRING:-}
      COPERNICUS_CLIENT_ID: ${COPERNICUS_CLIENT_ID:-}
      COPERNICUS_CLIENT_SECRET: ${COPERNICUS_CLIENT_SECRET:-}
      WINDY_API_KEY: ${WINDY_API_KEY:-}
    volumes:
      - uploads:/data/uploads
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    environment:
      API_BASE_URL: http://localhost:8000
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  db_data:
  uploads:
